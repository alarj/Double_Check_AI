services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: always

  logic-app:
    build: ./logic
    container_name: logic-app
    working_dir: /app
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - VECTOR_DB_PATH=/app/storage/vector_db
    command: >
      streamlit run main.py 
      --server.address=0.0.0.0 
      --server.port=8501 
      --server.enableCORS=false 
      --server.enableXsrfProtection=false 
      --server.headless=true
    depends_on:
      - ollama
    ports:
      - "8501:8501"
    volumes:
      - ./logic:/app
      - ./storage:/app/storage
    restart: always

  api:
    build: ./logic
    container_name: logic-api
    working_dir: /app
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    volumes:
      - ./logic:/app
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    restart: always

volumes:
  ollama_data:
