services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: always
    # See rida garanteerib, et kõik vajalikud mudelid tõmmatakse automaatselt käivitamisel
    entrypoint: /bin/sh -c "ollama serve & sleep 10 && ollama pull llama3:8b && ollama pull gemma2:2b && ollama pull mistral && ollama pull phi3 && ollama pull mxbai-embed-large && ollama pull bge-m3 && ollama pull alarjoeste/estonian-normalizer && wait"

  logic-app:
    build: ./logic
    container_name: logic-app
    working_dir: /app
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - BUILD_TIME=${BUILD_TIME:-teadmata}
      - BUILD_BRANCH=${BUILD_BRANCH:-teadmata}
      - WORKSPACE_DIR=/workspace
    # Käivitame Streamlit rakenduse
    command: >
      streamlit run main.py 
      --server.address=0.0.0.0 
      --server.port=8501 
      --server.enableCORS=false 
      --server.enableXsrfProtection=false 
      --server.headless=true
    depends_on:
      - ollama
    ports:
      - "8501:8501"
    volumes:
      - ./logic:/app
      - ./data_pipeline:/app/data_pipeline
      - ./storage:/app/storage
      # Read-only kogu repo mount ainult git-meta ja debugi jaoks.
      - ./:/workspace:ro
    restart: always  

  api:
    build: ./logic
    container_name: logic-api
    working_dir: /app
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - BUILD_TIME=${BUILD_TIME:-teadmata}
      - BUILD_BRANCH=${BUILD_BRANCH:-teadmata}
      - WORKSPACE_DIR=/workspace
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    volumes:
      - ./logic:/app
      - ./storage:/app/storage
      - ./testing:/testing
      - ./:/workspace:ro
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    restart: always


  test-app:
    build: ./logic
    container_name: test-app
    working_dir: /app
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - BUILD_TIME=${BUILD_TIME:-teadmata}
      - BUILD_BRANCH=${BUILD_BRANCH:-teadmata}
    # See konteiner ootab käsku (manual trigger) või käivitab konkreetse testi
    command: tail -f /dev/null
    depends_on:
      - ollama
    volumes:
      - ./logic:/app
      - ./testing:/testing  # <--- SEE RIDA ÜHENDAB TESTID
      - ./storage:/app/storage
      - ./:/workspace:ro
    restart: always  

volumes:
  ollama_data:
